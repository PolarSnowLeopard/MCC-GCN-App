name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric rdkit-pypi
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Django check & migrate
        run: |
          python -c "
          import django, os
          os.environ['DJANGO_SETTINGS_MODULE'] = 'config.settings'
          import config.settings as s
          s.DATABASES['default'] = {'ENGINE': 'django.db.backends.sqlite3', 'NAME': ':memory:'}
          django.setup()
          from django.core.management import call_command
          call_command('check')
          call_command('migrate', verbosity=0)
          print('Django check + migrate OK')
          "

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mcc-gcn-backend ./backend

      - name: Build frontend image
        run: docker build -t mcc-gcn-frontend ./frontend
